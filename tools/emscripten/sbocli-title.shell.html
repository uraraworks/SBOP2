<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>SBOP2 SboCli Title</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10141a;
      --panel: #18202a;
      --text: #e7edf5;
      --subtle: #91a0b3;
      --accent: #58c4dd;
      --border: #2d3947;
      --game-scale: 1;
      --pad-h: 160px; /* モバイル時のパッド領域の高さ */
      --embed-height: 100dvh;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #1f2a36 0%, var(--bg) 45%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
    }

    .layout {
      width: min(92vw, 760px);
      padding: 20px;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: rgba(24, 32, 42, 0.92);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--subtle);
      font-size: 14px;
    }

    .status {
      color: var(--accent);
      font-weight: 600;
    }

    .probe {
      color: var(--subtle);
      font: 12px/1.5 Consolas, monospace;
      word-break: break-all;
    }

    .canvas-wrap {
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 10px;
      position: relative;
    }

    .canvas-stage {
      position: relative;
      width: calc(480px * var(--game-scale));
      height: calc(480px * var(--game-scale));
    }

    #canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      border: 1px solid #000;
      outline: none;
    }

    #sbop2ImeInput {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      padding: 0;
      border: 0;
      opacity: 0.01;
      color: transparent;
      background: transparent;
      caret-color: transparent;
      resize: none;
      overflow: hidden;
      pointer-events: none;
      ime-mode: active;
      z-index: 0;
    }

    /* ── Click to Start オーバーレイ ── */
    #startOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 14, 20, 0.82);
      z-index: 10;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
    }

    /* ロード中は操作不可 */
    #startOverlay.loading {
      pointer-events: none;
      cursor: default;
    }

    /* ロード中ブロック: loading クラスがある間のみ表示 */
    #startOverlay .start-loading {
      display: none;
    }
    #startOverlay.loading .start-loading {
      display: block;
      font-size: clamp(14px, 3vw, 20px);
      color: var(--subtle);
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ready ブロック: loading クラスがある間は非表示 */
    #startOverlay .start-ready {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #startOverlay.loading .start-ready {
      display: none;
    }

    #startOverlay .start-title {
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    #startOverlay .start-sub {
      font-size: clamp(12px, 2.5vw, 16px);
      color: var(--accent);
      letter-spacing: 0.12em;
    }

    #startOverlay .start-hint {
      margin-top: 20px;
      font-size: 11px;
      color: var(--subtle);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .login-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      font-family: "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", sans-serif;
      color: #111;
    }

    .login-panel {
      position: absolute;
      pointer-events: none;
    }

    .login-label {
      position: absolute;
      left: 0;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      color: #111;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.3);
      white-space: nowrap;
    }

    .login-input {
      position: absolute;
      margin: 0;
      padding: 0 4px;
      border: 1px solid #9b6a38;
      background: #fffaf3;
      color: #111;
      font: 12px/1 "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", sans-serif;
      pointer-events: auto;
      outline: none;
    }

    .login-input:focus {
      border-color: #ffc96d;
      box-shadow: 0 0 0 1px #ffc96d;
    }

    .login-check {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #111;
      pointer-events: auto;
      white-space: nowrap;
    }

    .login-check input {
      width: 12px;
      height: 12px;
      margin: 0;
      accent-color: #9b6a38;
    }

    .login-button {
      position: absolute;
      margin: 0;
      padding: 0;
      border: 1px solid #9b6a38;
      background: linear-gradient(#fff0cf, #e7be80);
      color: #111;
      font: 12px/1 "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", sans-serif;
      pointer-events: auto;
      cursor: pointer;
    }

    .login-button:disabled,
    .login-input:disabled,
    .login-check input:disabled {
      opacity: 0.7;
      cursor: default;
    }

    #output {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      background: #0d1117;
      color: #d7e2f0;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font: 12px/1.5 Consolas, monospace;
    }

    /* 管理者画面の iframe 埋め込み時はゲーム画面のみを表示する */
    body.admin-embed {
      min-height: 100vh;
      background: transparent;
    }
    body.admin-embed .layout {
      width: 100%;
      padding: 0;
      gap: 0;
    }
    body.admin-embed .panel.header,
    body.admin-embed .panel.probe,
    body.admin-embed > main > section.panel:last-of-type {
      display: none !important;
    }
    body.admin-embed .panel.canvas-wrap {
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
      border-radius: 0;
    }
    body.admin-embed .canvas-stage {
      width: calc(480px * var(--game-scale));
      height: calc(480px * var(--game-scale));
    }

    /* ---- モバイル全画面モード（タッチ操作が主の端末＝スマホ/タブレットのみ） ---- */
    /* JS の initVirtualPad が isTouch 判定後に body.mobile-pad を付与する */
    html:has(body.mobile-pad),
    body.mobile-pad {
      height: 100%;
    }
    body.mobile-pad {
      overflow: hidden;
      overscroll-behavior: none;
      height: 100vh;
      height: 100dvh;
      display: flex;
      background: var(--bg);
    }
    body.mobile-pad .layout {
      width: 100%;
      height: 100%;
      padding: 0;
      gap: 0;
      display: flex;
      flex-direction: column;
    }
    /* ログ欄を非表示: status ヘッダ / デバッグ probe / 下部 output テキストエリア */
    body.mobile-pad .panel.header,
    body.mobile-pad .panel.probe,
    body.mobile-pad > main > section.panel:last-of-type {
      display: none !important;
    }
    /* canvas-wrap を残りの縦領域すべてに拡張 */
    body.mobile-pad .panel.canvas-wrap {
      flex: 1;
      min-height: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* 固定パッドとゲーム画面が重ならないよう下にパッド高分の余白を確保 */
      padding-bottom: var(--pad-h);
    }
    /*
      管理Webの iframe 埋め込みでは外側も全画面高さを管理するため、
      mobile-pad の中央寄せだとゲーム画面と固定パッドの間に余白が出やすい。
      埋め込み時だけキャンバスをパッド直上へ寄せる。
    */
    body.admin-embed.mobile-pad .panel.canvas-wrap {
      justify-content: flex-end;
    }
    body.admin-embed.mobile-pad {
      position: relative;
      height: var(--embed-height);
    }
    body.admin-embed.mobile-pad .layout {
      height: var(--embed-height);
    }
    /* ゲーム画面を短辺基準でパッド高を差し引いた領域にフィット（正方形キャンバス想定） */
    body.mobile-pad .canvas-stage {
      /* dvh 非対応の古い iOS 向けに vh フォールバックを先に指定し、対応環境では下の dvh が上書きする */
      width: min(100vw, calc(100vh - var(--pad-h)));
      height: min(100vw, calc(100vh - var(--pad-h)));
      width: min(100vw, calc(100dvh - var(--pad-h)));
      height: min(100vw, calc(100dvh - var(--pad-h)));
    }
    body.admin-embed.mobile-pad .canvas-stage {
      width: min(100vw, calc(var(--embed-height) - var(--pad-h)));
      height: min(100vw, calc(var(--embed-height) - var(--pad-h)));
    }
    /* パッドを画面最下部に固定オーバーレイで常設（レイアウト/重なりの影響を受けないようにする） */
    body.mobile-pad #virtualPad {
      display: flex;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: var(--pad-h);
      z-index: 2147483647;
      justify-content: space-between;
      align-items: center;
      background: rgba(16, 20, 26, 0.92);
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      box-sizing: border-box;
    }
    body.admin-embed.mobile-pad #virtualPad {
      position: absolute;
    }

    /* ---- バーチャルパッド ---- */
    /* タッチ端末判定で JS から display:flex を付与。PC では display:none のまま */
    #virtualPad {
      display: none;
      justify-content: space-between;
      align-items: center;
      width: calc(480px * var(--game-scale));
      max-width: 100%;
      padding: 8px 16px;
      box-sizing: border-box;
      /* 長押し選択・ダブルタップズームを抑制 */
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    /* アナログスティック */
    .pad-stick {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.45);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex: 0 0 auto;
    }
    .pad-stick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin-left: -28px;
      margin-top: -28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.7);
      /* JS が translate でノブ位置を更新する。初期は中央 */
      transform: translate(0px, 0px);
      pointer-events: none;
    }
    /* A/B/補助ボタン: 右側グリッド */
    #virtualPad .pad-buttons {
      display: grid;
      grid-template-columns: repeat(2, 64px);
      gap: 10px;
      align-items: center;
      justify-content: center;
    }
    /* 共通ボタンスタイル */
    #virtualPad button {
      min-width: 56px;
      min-height: 56px;
      width: 64px;
      height: 56px;
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.30);
      color: #ffffff;
      /* ボタン押下時のハイライトをブラウザ既定から無効化 */
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #virtualPad button:active {
      background: rgba(88, 196, 221, 0.75);
    }
    /* 十字キー dpad 配置ルールは削除（アナログスティックに置き換え済み） */
    /* 管理者画面埋め込み時はバーチャルパッドを非表示 */
    /* ただしモバイル全画面モード時はパッドを出すため除外 */
    body.admin-embed:not(.mobile-pad) #virtualPad {
      display: none !important;
    }

    /* ============================================================
       チャット UI (PC: 右下常設パネル / スマホ: ミニログ+ボトムシート)
       ============================================================ */

    /* ---- PC チャットパネル ---- */
    #chatPanel {
      display: none; /* 最初のログ到達まで非表示 */
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 320px;
      z-index: 500;
      font-family: "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", "Segoe UI", sans-serif;
      font-size: 13px;
    }
    #chatPanel.chat-visible {
      display: flex;
      flex-direction: column;
    }
    /* 折りたたみ時はヘッダのみ表示 */
    #chatPanel.chat-collapsed #chatLogWrap,
    #chatPanel.chat-collapsed #chatInputRow {
      display: none;
    }
    #chatPanelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(24, 32, 42, 0.88);
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      padding: 6px 10px;
      cursor: default;
      user-select: none;
    }
    #chatPanel.chat-collapsed #chatPanelHeader {
      border-radius: 10px;
    }
    #chatPanelTitle {
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
    }
    #chatCollapseBtn {
      background: none;
      border: none;
      color: var(--subtle);
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    #chatCollapseBtn:hover {
      color: var(--text);
    }
    #chatLogWrap {
      background: rgba(16, 20, 26, 0.82);
      border: 1px solid var(--border);
      border-top: none;
      overflow-y: auto;
      height: 160px;
      resize: both;
      min-height: 60px;
      min-width: 180px;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-log-line {
      word-break: break-all;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    #chatInputRow {
      display: flex;
      background: rgba(24, 32, 42, 0.92);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 6px 8px;
      gap: 6px;
    }
    #chatInput {
      flex: 1;
      background: rgba(13, 17, 23, 0.9);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font: 13px/1 "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", "Segoe UI", sans-serif;
      padding: 4px 8px;
      outline: none;
    }
    #chatInput:focus {
      border-color: var(--accent);
    }
    #chatSendBtn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #10141a;
      font: bold 12px/1 "Segoe UI", sans-serif;
      padding: 4px 10px;
      cursor: pointer;
    }
    #chatSendBtn:hover {
      opacity: 0.85;
    }
    /* PC モードでは スマホ UI を非表示 */
    #chatMiniLog,
    #chatOpenBtn,
    #chatBottomSheet {
      display: none;
    }

    /* ---- スマホ: ミニログ (画面左上、タッチ透過) ---- */
    body.mobile-pad #chatMiniLog {
      display: block;
      position: fixed;
      top: 8px;
      left: 8px;
      width: min(240px, 60vw);
      pointer-events: none;
      z-index: 600;
      font-family: "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", sans-serif;
      font-size: 12px;
    }
    .chat-mini-line {
      background: rgba(10, 14, 20, 0.65);
      color: #e7edf5;
      border-radius: 4px;
      padding: 2px 6px;
      margin-bottom: 2px;
      word-break: break-all;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    #chatMiniLog.chat-mini-fade {
      transition: opacity 0.6s ease;
      opacity: 0;
    }

    /* ---- スマホ: チャット開くボタン ---- */
    body.mobile-pad #chatOpenBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      /* バーチャルパッド(下160px)の左端付近、スティックと被らない位置 */
      bottom: calc(var(--pad-h) + 8px);
      left: 8px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(24, 32, 42, 0.88);
      border: 2px solid rgba(255, 255, 255, 0.45);
      color: #ffffff;
      font-size: 22px;
      cursor: pointer;
      z-index: 600;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    body.mobile-pad #chatOpenBtn:active {
      background: rgba(88, 196, 221, 0.75);
    }

    /* ---- スマホ: ボトムシート ---- */
    body.mobile-pad #chatBottomSheet {
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 50dvh;
      z-index: 700;
      background: rgba(18, 24, 34, 0.97);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      padding: 10px 12px;
      font-family: "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", sans-serif;
      font-size: 14px;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }
    body.mobile-pad #chatBottomSheet.sheet-open {
      transform: translateY(0);
    }
    #chatSheetHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    #chatSheetTitle {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    #chatSheetCloseBtn {
      background: none;
      border: none;
      color: var(--subtle);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }
    #chatSheetLog {
      flex: 1;
      overflow-y: auto;
      padding: 4px 2px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    #chatSheetInputRow {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    #chatSheetInput {
      flex: 1;
      background: rgba(13, 17, 23, 0.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: 16px/1.2 "Meiryo UI", "Meiryo", "Yu Gothic UI", "Yu Gothic", sans-serif;
      padding: 8px 10px;
      outline: none;
    }
    #chatSheetInput:focus {
      border-color: var(--accent);
    }
    #chatSheetSendBtn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #10141a;
      font: bold 14px/1 "Segoe UI", sans-serif;
      padding: 8px 14px;
      cursor: pointer;
    }
    /* ---- チャット UI は admin-embed 時は非表示 ---- */
    body.admin-embed #chatPanel,
    body.admin-embed #chatMiniLog,
    body.admin-embed #chatOpenBtn,
    body.admin-embed #chatBottomSheet {
      display: none !important;
    }

    /* ---- ゲーム開始(マップ画面)前はスマホ用チャット UI を出さない ---- */
    /* body.game-map は JS が Module.sbop2GameState===GAMESTATE_MAP のとき付与する */
    body.mobile-pad:not(.game-map) #chatMiniLog,
    body.mobile-pad:not(.game-map) #chatOpenBtn,
    body.mobile-pad:not(.game-map) #chatBottomSheet {
      display: none !important;
    }

    /* ---- ボトムシート表示中はバーチャルパッドを隠す ---- */
    /* パッドは z-index 最大かつ画面下部を覆うため、出したままだと入力欄が押せない */
    body.mobile-pad.chat-sheet-open #virtualPad {
      display: none !important;
    }
    /* デバッグ情報パネルは ?debug=1 のときのみ表示（通常ルートでは非表示） */
    body:not(.debug-mode) .debug-panel { display: none; }
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel header debug-panel">
      <div>SBOP2 browser title build</div>
      <div id="status" class="status">起動中...</div>
    </section>

    <section class="panel probe debug-panel">
      <div id="canvasProbe">canvas-probe: pending</div>
      <div id="fpsDisplay" style="font-family:monospace; font-size:14px; color:#0f0; margin-top:4px;">FPS: --</div>
    </section>

    <section class="panel canvas-wrap">
      <div class="canvas-stage">
        <canvas id="canvas" width="480" height="480" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
        <textarea id="sbop2ImeInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
        <!-- Click to Start オーバーレイ（Autoplay Policy 対策） -->
        <!-- 初期状態は loading クラス付き → 操作不可・読み込み中表示 -->
        <div id="startOverlay" class="loading">
          <!-- ロード中ブロック（loading 中のみ表示） -->
          <div class="start-loading">読み込み中...</div>
          <!-- ready ブロック（loading 解除後に表示） -->
          <div class="start-ready">
            <div class="start-title">クリックしてスタート</div>
            <div class="start-sub">Click to Start</div>
            <div class="start-hint">▼ タップまたはキーを押してください ▼</div>
          </div>
        </div>
        <div id="loginOverlay" class="login-overlay" hidden>
          <div id="loginPanel" class="login-panel">
            <div id="loginLabelAccount" class="login-label">アカウント</div>
            <div id="loginLabelPassword" class="login-label">パスワード</div>
            <input id="loginAccount" class="login-input" type="text" spellcheck="false" autocomplete="username">
            <input id="loginPassword" class="login-input" type="password" spellcheck="false" autocomplete="current-password">
            <label id="loginSaveWrap" class="login-check">
              <input id="loginSave" type="checkbox">
              <span>パスワードを記録する</span>
            </label>
            <button id="loginConnect" class="login-button" type="button">接続</button>
          </div>
        </div>
      </div>
      <!-- バーチャルパッド: タッチ端末のみ表示（JS でタッチ判定後に display:flex を付与） -->
      <div id="virtualPad">
        <!-- アナログスティック（ドラッグで8方向入力） -->
        <div class="pad-stick" id="padStick">
          <div class="pad-stick-knob" id="padStickKnob"></div>
        </div>
        <!-- A/B/補助ボタン（右側グリッド） -->
        <div class="pad-buttons">
          <button id="padA" type="button">Z</button>
          <button id="padB" type="button">X</button>
          <button id="padTab" type="button">Tab</button>
          <button id="padSpace" type="button">Space</button>
        </div>
      </div>
    </section>

    <section class="panel debug-panel">
      <textarea id="output" rows="8" readonly></textarea>
    </section>
  </main>

  <!-- ============================================================
       チャット UI: PC 常設パネル（position:fixed, 右下）
       最初のログ到達まで非表示。mobile-pad 時は CSS で隠れる。
       ============================================================ -->
  <div id="chatPanel">
    <div id="chatPanelHeader">
      <span id="chatPanelTitle">チャット</span>
      <button id="chatCollapseBtn" type="button" title="折りたたみ">▼</button>
    </div>
    <div id="chatLogWrap"></div>
    <div id="chatInputRow">
      <input id="chatInput" type="text" placeholder="メッセージを入力…"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button id="chatSendBtn" type="button">送信</button>
    </div>
  </div>

  <!-- ============================================================
       チャット UI: スマホ ミニログ（position:fixed, 左上, タッチ透過）
       mobile-pad 時のみ CSS で表示。
       ============================================================ -->
  <div id="chatMiniLog"></div>

  <!-- ============================================================
       チャット UI: スマホ チャット開くボタン（position:fixed, パッド上左端）
       mobile-pad 時のみ CSS で表示。
       ============================================================ -->
  <button id="chatOpenBtn" type="button" title="チャットを開く">💬</button>

  <!-- ============================================================
       チャット UI: スマホ ボトムシート（position:fixed, 下半分）
       mobile-pad 時のみ CSS で制御。初期は translateY(100%) で隠れる。
       ============================================================ -->
  <div id="chatBottomSheet">
    <div id="chatSheetHeader">
      <span id="chatSheetTitle">チャット</span>
      <button id="chatSheetCloseBtn" type="button" title="閉じる">✕</button>
    </div>
    <div id="chatSheetLog"></div>
    <div id="chatSheetInputRow">
      <input id="chatSheetInput" type="text" placeholder="メッセージを入力…"
             enterkeyhint="send" autocomplete="off" autocapitalize="off"
             autocorrect="off" spellcheck="false">
      <button id="chatSheetSendBtn" type="button">送信</button>
    </div>
  </div>

  <script>
    // URL クエリ ?admin=1 が指定されたら管理者画面の iframe 埋め込みとして
    // ゲーム画面のみを表示するように body にクラスを付与する
    (function applyAdminEmbedMode() {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') === '1') {
          document.body.classList.add('admin-embed');
        }
      } catch (e) {
        console.warn('[SBOP2] admin embed query parse failed:', e);
      }
    })();

    // ?debug=1 が付いている場合のみデバッグパネルを表示する
    try {
      if (new URLSearchParams(window.location.search).get('debug') === '1') {
        document.body.classList.add('debug-mode');
      }
    } catch (e) {}

    // URL クエリ ?server=host:port を解析して window.sbop2ServerAddr / sbop2ServerPort にセット
    (function parseServerQuery() {
      try {
        const params = new URLSearchParams(window.location.search);
        const server = params.get('server');
        if (server) {
          const colonIdx = server.lastIndexOf(':');
          if (colonIdx > 0) {
            const host = server.substring(0, colonIdx);
            const port = parseInt(server.substring(colonIdx + 1), 10);
            if (host && port > 0) {
              window.sbop2ServerAddr = host;
              window.sbop2ServerPort = port;
            }
          }
        }
      } catch (e) {
        console.warn('[SBOP2] server query parse failed:', e);
      }
    })();

    const statusElement = document.getElementById('status');
    const canvasElement = document.getElementById('canvas');
    const imeInputElement = document.getElementById('sbop2ImeInput');

    function applyAdminViewportHeight(height) {
      var nHeight = Number(height);
      if (!Number.isFinite(nHeight) || nHeight < 240) {
        return;
      }
      document.documentElement.style.setProperty('--embed-height', Math.floor(nHeight) + 'px');
    }
    const outputElement = document.getElementById('output');
    const probeElement = document.getElementById('canvasProbe');
    const startOverlay = document.getElementById('startOverlay');
    const startLoadingElement = startOverlay ? startOverlay.querySelector('.start-loading') : null;
    const loginOverlay = document.getElementById('loginOverlay');
    const loginPanel = document.getElementById('loginPanel');
    const loginLabelAccount = document.getElementById('loginLabelAccount');
    const loginLabelPassword = document.getElementById('loginLabelPassword');
    const loginAccountInput = document.getElementById('loginAccount');
    const loginPasswordInput = document.getElementById('loginPassword');
    const loginSaveWrap = document.getElementById('loginSaveWrap');
    const loginSaveInput = document.getElementById('loginSave');
    const loginConnectButton = document.getElementById('loginConnect');

    function focusGameInput(force) {
      // モバイル全画面モード(body.mobile-pad)では仮想パッドで操作するため、
      // 隠しIME入力欄(#sbop2ImeInput)へのフォーカスは行わない。
      // iOS でこれを行うとソフトキーボードが出て画面下のバーチャルパッドを覆ってしまう。
      if (document.body.classList.contains('mobile-pad')) {
        return;
      }
      // 以下、既存処理
      if (!imeInputElement || (!force && loginOverlay.contains(document.activeElement))) {
        return;
      }
      imeInputElement.focus({ preventScroll: true });
    }

    function isLoginElementActive() {
      return !!(loginOverlay && loginOverlay.contains(document.activeElement));
    }

    // チャット用 DOM 入力欄(PC パネル / スマホシート)がフォーカス中か。
    // これらに入力中は、下の capture フェーズ keydown が
    // focusGameInput() でフォーカスを奪わないようにする。
    function isChatInputActive() {
      const a = document.activeElement;
      return !!(a && (a.id === 'chatInput' || a.id === 'chatSheetInput'));
    }

    function updateIntegerGameScale() {
      const maxW = document.body.classList.contains('admin-embed')
        ? window.innerWidth
        : Math.min(window.innerWidth * 0.9, 480);
      const maxH = document.body.classList.contains('admin-embed')
        ? window.innerHeight
        : Math.min(window.innerHeight * 0.9, 480);
      const scale = Math.max(1, Math.floor(Math.min(maxW, maxH) / 480));
      document.documentElement.style.setProperty('--game-scale', String(scale));
    }

    function clearGameImeInput() {
      if (imeInputElement) {
        imeInputElement.value = '';
      }
    }

    function callChatBridge(name, text) {
      if (!Module || typeof Module.ccall !== 'function') {
        return;
      }
      Module.ccall(name, null, ['string'], [text || '']);
    }

    function setChatComposition(text) {
      callChatBridge('SBOP2_BrowserChatSetComposition', text);
    }

    function commitChatText(text) {
      if (text) {
        callChatBridge('SBOP2_BrowserChatCommitText', text);
      }
    }

    let gameInputComposing = false;
    let suppressGameInputEnterUntil = 0;
    let ignoreGameInputUntil = 0;
    let compositionInputFallbackUntil = 0;
    canvasElement.addEventListener('mousedown', () => focusGameInput(false));
    canvasElement.addEventListener('touchstart', () => focusGameInput(false), { passive: true });
    imeInputElement.addEventListener('compositionstart', () => {
      gameInputComposing = true;
      setChatComposition('');
    });
    imeInputElement.addEventListener('compositionupdate', (event) => {
      gameInputComposing = true;
      setChatComposition(event.data || imeInputElement.value || '');
    });
    imeInputElement.addEventListener('compositionend', (event) => {
      const text = event.data || imeInputElement.value || '';
      gameInputComposing = false;
      setChatComposition('');
      commitChatText(text);
      clearGameImeInput();
      suppressGameInputEnterUntil = performance.now() + 250;
      if (text) {
        ignoreGameInputUntil = performance.now() + 120;
        compositionInputFallbackUntil = 0;
      } else {
        compositionInputFallbackUntil = performance.now() + 120;
      }
    });
    imeInputElement.addEventListener('input', () => {
      if (gameInputComposing) {
        return;
      }
      if (performance.now() < ignoreGameInputUntil) {
        clearGameImeInput();
        return;
      }
      const text = imeInputElement.value || '';
      if (performance.now() < compositionInputFallbackUntil) {
        commitChatText(text);
      }
      clearGameImeInput();
    });
    imeInputElement.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && (event.isComposing || gameInputComposing || performance.now() < suppressGameInputEnterUntil)) {
        event.preventDefault();
        event.stopImmediatePropagation();
      }
    }, true);
    document.addEventListener('keydown', (event) => {
      if (!startGameCalled || isLoginElementActive() || isChatInputActive()) {
        return;
      }
      if (document.activeElement !== imeInputElement) {
        focusGameInput(true);
      }
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(event.key)) {
        event.preventDefault();
      }
    }, true);

    // ── Click to Start: ユーザー操作による AudioContext の resume ──
    let startGameCalled = false;
    let lastStartTouchTime = 0;
    function startGame() {
      if (startGameCalled) return;
      startGameCalled = true;

      // オーバーレイを非表示にしてIME対応のゲーム入力欄へフォーカス移動
      if (startOverlay) {
        startOverlay.style.display = 'none';
      }
      focusGameInput(false);

      // SDL2 の AudioContext を resume する（Autoplay Policy 対策）
      try {
        const audioCtx = (Module && Module.SDL2 && Module.SDL2.audioContext)
          || (window.SDL2 && window.SDL2.audioContext)
          || null;
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume().catch(function(e) {
            console.warn('[SBOP2] AudioContext.resume failed:', e);
          });
        }
      } catch (e) {
        console.warn('[SBOP2] AudioContext resume error:', e);
      }

      // C++ 側が参照できるフラグをセット
      if (Module) {
        Module.sbop2UserActivated = true;
      }
    }

    // onRuntimeInitialized から呼ばれる: loading → ready に切り替えてリスナ登録
    function markStartOverlayReady() {
      if (!startOverlay) return;
      // loading クラスを外すと CSS で ready ブロックが表示され pointer-events も戻る
      startOverlay.classList.remove('loading');

      // touchstart 後にブラウザが合成 click を発行する端末があるため、タッチ起動時は後続 click を抑止する。
      startOverlay.addEventListener('touchstart', function onFirstTouch(event) {
        lastStartTouchTime = performance.now();
        event.preventDefault();
        startGame();
        startOverlay.removeEventListener('touchstart', onFirstTouch);
      }, { passive: false });
      startOverlay.addEventListener('click', function onFirstClick(event) {
        if (performance.now() - lastStartTouchTime < 700) {
          event.preventDefault();
          return;
        }
        startGame();
        startOverlay.removeEventListener('click', onFirstClick);
      });
      // キーダウンでも開始できるようにする（オーバーレイが表示中の間のみ）
      window.addEventListener('keydown', function onFirstKey() {
        startGame();
        window.removeEventListener('keydown', onFirstKey);
      });
    }

    function updateStartLoadingText(text) {
      if (startLoadingElement && startOverlay && startOverlay.classList.contains('loading')) {
        startLoadingElement.textContent = text || '読み込み中...';
      }
    }

    function callLoginBridge(name, argTypes, args) {
      if (!Module || typeof Module.ccall !== 'function') {
        return;
      }
      Module.ccall(name, null, argTypes, args);
    }

    function focusLoginControl(focusIndex) {
      if (focusIndex === 0 && document.activeElement !== loginAccountInput) {
        loginAccountInput.focus({ preventScroll: true });
      } else if (focusIndex === 1 && document.activeElement !== loginPasswordInput) {
        loginPasswordInput.focus({ preventScroll: true });
      } else if (focusIndex === 2 && document.activeElement !== loginSaveInput) {
        loginSaveInput.focus({ preventScroll: true });
      } else if (focusIndex === 3 && document.activeElement !== loginConnectButton) {
        loginConnectButton.focus({ preventScroll: true });
      }
    }

    window.SBOP2HideLoginOverlay = function() {
      // ログイン入力要素にフォーカスがあったらゲーム入力欄に戻す
      // （SDL2 Emscripten port は指定したキーボード要素にフォーカスが無いとキー入力を受け取らない）
      if (loginOverlay.contains(document.activeElement)) {
        focusGameInput(true);
      }
      loginOverlay.hidden = true;
    };

    window.SBOP2UpdateLoginOverlay = function(state) {
      if (!state || !state.visible) {
        window.SBOP2HideLoginOverlay();
        return;
      }

      const canvasRect = canvasElement.getBoundingClientRect();
      const scaleX = canvasRect.width / canvasElement.width;
      const scaleY = canvasRect.height / canvasElement.height;

      loginOverlay.hidden = false;
      const overlayOffsetX = Math.round(-22 * scaleX);
      const overlayOffsetY = Math.round(-22 * scaleY);
      const fontSizeLabel = Math.max(11, Math.round(12 * scaleY));
      const fontSizeInput = Math.max(11, Math.round(12 * scaleY));
      const fontSizeCheck = Math.max(10, Math.round(11 * scaleY));
      const fontSizeButton = Math.max(11, Math.round(12 * scaleY));

      loginPanel.style.left = ((state.windowX * scaleX) + overlayOffsetX) + 'px';
      loginPanel.style.top = ((state.windowY * scaleY) + overlayOffsetY) + 'px';
      loginPanel.style.width = (state.windowW * scaleX) + 'px';
      loginPanel.style.height = (state.windowH * scaleY) + 'px';

      loginLabelAccount.style.left = Math.round(18 * scaleX) + 'px';
      loginLabelAccount.style.top = Math.round(6 * scaleY) + 'px';
      loginLabelPassword.style.left = Math.round(18 * scaleX) + 'px';
      loginLabelPassword.style.top = Math.round(32 * scaleY) + 'px';
      loginLabelAccount.style.fontSize = fontSizeLabel + 'px';
      loginLabelPassword.style.fontSize = fontSizeLabel + 'px';

      loginAccountInput.style.left = Math.round((state.accountX - state.windowX - 8) * scaleX) + 'px';
      loginAccountInput.style.top = Math.round((state.accountY - state.windowY - 12) * scaleY) + 'px';
      loginAccountInput.style.width = (state.accountW * scaleX) + 'px';
      loginAccountInput.style.height = (state.accountH * scaleY) + 'px';
      loginAccountInput.style.fontSize = fontSizeInput + 'px';

      loginPasswordInput.style.left = Math.round((state.passwordX - state.windowX - 8) * scaleX) + 'px';
      loginPasswordInput.style.top = Math.round((state.passwordY - state.windowY - 12) * scaleY) + 'px';
      loginPasswordInput.style.width = (state.passwordW * scaleX) + 'px';
      loginPasswordInput.style.height = (state.passwordH * scaleY) + 'px';
      loginPasswordInput.style.fontSize = fontSizeInput + 'px';

      loginSaveWrap.style.left = Math.round((state.checkX - state.windowX - 4) * scaleX) + 'px';
      loginSaveWrap.style.top = Math.round((state.checkY - state.windowY - 10) * scaleY) + 'px';
      loginSaveWrap.style.fontSize = fontSizeCheck + 'px';

      loginConnectButton.style.left = Math.round((state.buttonX - state.windowX - 10) * scaleX) + 'px';
      loginConnectButton.style.top = Math.round((state.buttonY - state.windowY - 10) * scaleY) + 'px';
      loginConnectButton.style.width = (state.buttonW * scaleX) + 'px';
      loginConnectButton.style.height = (state.buttonH * scaleY) + 'px';
      loginConnectButton.style.fontSize = fontSizeButton + 'px';

      if (loginAccountInput.value !== state.account) {
        loginAccountInput.value = state.account;
      }
      if (loginPasswordInput.value !== state.password) {
        loginPasswordInput.value = state.password;
      }
      loginSaveInput.checked = !!state.savePassword;

      loginAccountInput.disabled = !state.enabled;
      loginPasswordInput.disabled = !state.enabled;
      loginSaveInput.disabled = !state.enabled;
      loginConnectButton.disabled = !state.enabled;

      focusLoginControl(state.focusIndex);
    };

    loginAccountInput.addEventListener('focus', () => callLoginBridge('SBOP2_BrowserLoginSetFocus', ['number'], [0]));
    loginPasswordInput.addEventListener('focus', () => callLoginBridge('SBOP2_BrowserLoginSetFocus', ['number'], [1]));
    loginSaveInput.addEventListener('focus', () => callLoginBridge('SBOP2_BrowserLoginSetFocus', ['number'], [2]));
    loginConnectButton.addEventListener('focus', () => callLoginBridge('SBOP2_BrowserLoginSetFocus', ['number'], [3]));

    loginAccountInput.addEventListener('input', (event) => {
      callLoginBridge('SBOP2_BrowserLoginSetAccount', ['string'], [event.target.value]);
    });
    loginPasswordInput.addEventListener('input', (event) => {
      callLoginBridge('SBOP2_BrowserLoginSetPassword', ['string'], [event.target.value]);
    });
    loginSaveInput.addEventListener('change', (event) => {
      callLoginBridge('SBOP2_BrowserLoginSetSavePassword', ['number'], [event.target.checked ? 1 : 0]);
    });
    loginConnectButton.addEventListener('click', () => {
      callLoginBridge('SBOP2_BrowserLoginConnect', [], []);
      window.SBOP2RequestWebAdminSession(loginAccountInput.value, loginPasswordInput.value);
    });

    for (const element of [loginAccountInput, loginPasswordInput]) {
      element.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          callLoginBridge('SBOP2_BrowserLoginConnect', [], []);
          window.SBOP2RequestWebAdminSession(loginAccountInput.value, loginPasswordInput.value);
        }
      });
    }

    window.addEventListener('resize', updateIntegerGameScale);
    updateIntegerGameScale();

    window.SBOP2RequestWebAdminSession = function(account, password) {
      if (!account || !password) {
        return;
      }
      fetch('/api/auth/admin-login', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        credentials: 'same-origin',
        body: JSON.stringify({ loginId: account, password: password })
      })
        .then((response) => response.ok ? response.json() : null)
        .then((data) => {
          if (!data || !data.authenticated || !(Number(data.adminLevel) > 0)) {
            return;
          }
          if (window.parent) {
            window.parent.postMessage({ kind: 'sbop2_admin_session_ready' }, window.location.origin);
          }
        })
        .catch((error) => {
          console.warn('[SBOP2] web admin session request failed:', error);
        });
    };

    function pumpSingleFrame() {
      if (!Module || typeof Module._SBOP2_BrowserPumpSingleFrame !== 'function') {
        return false;
      }
      if (Module.lastRunDependencyCount > 0) {
        return false;
      }
      // ユーザーアクティベーション前（Click to Start オーバーレイ表示中）はフレーム進行を止める
      if (!Module.sbop2UserActivated) {
        return false;
      }
      Module._SBOP2_BrowserPumpSingleFrame();
      Module.sbop2PumpFallbackActive = 1;
      Module.sbop2PumpFallbackTick = (Module.sbop2PumpFallbackTick || 0) + 1;
      return true;
    }

    function ensurePumpFallback() {
      if (!Module || Module.sbop2PumpFallbackChecked) {
        return;
      }
      Module.sbop2PumpFallbackChecked = 1;
      Module.sbop2PumpFallbackLastDraw = 0;
      Module.sbop2PumpFallbackLastChange = Date.now();
      Module.sbop2PumpFallbackTimer = window.setInterval(() => {
        if (!Module) {
          return;
        }
        // ユーザーアクティベーション前はフレーム進行を止める
        if (!Module.sbop2UserActivated) {
          return;
        }
        const drawCount = Module.sbop2OnDrawCount || 0;
        if (Module.sbop2PumpFallbackLastDraw !== drawCount) {
          Module.sbop2PumpFallbackLastDraw = drawCount;
          Module.sbop2PumpFallbackLastChange = Date.now();
        }

        const gameState = Module.sbop2GameState || 0;
        // 全ゲーム状態でフレーム駆動が必要（メインループが設定されていないため）
        const needsFrames = gameState > 0;
        const stalledMs = Date.now() - (Module.sbop2PumpFallbackLastChange || 0);
        if (needsFrames && stalledMs >= 120) {
          pumpSingleFrame();
        }
        updateCanvasProbe();
      }, 33);

      window.setTimeout(() => {
        // ユーザーアクティベーション前はフレーム進行を止める
        if (!Module.sbop2UserActivated) {
          return;
        }
        if ((Module.sbop2OnDrawCount || 0) === 0) {
          pumpSingleFrame();
          updateCanvasProbe();
        }
      }, 200);
    }

    function updateCanvasProbe() {
      if (!probeElement) {
        return;
      }
      try {
        const ctx = canvasElement.getContext('2d');
        let samples = 'no-ctx';
        if (ctx) {
          const samplePoints = [
            [0, 0],
            [32, 32],
            [80, 80],
            [240, 240]
          ];
          samples = samplePoints.map(([x, y]) => {
            const pixel = ctx.getImageData(x, y, 1, 1).data;
            return x + ',' + y + '=' + pixel[0] + '/' + pixel[1] + '/' + pixel[2] + '/' + pixel[3];
          }).join(' ');
        }
        const presentCount = (Module && Module.sbop2PresentCount) || 0;
        const presentSize = (Module && Module.sbop2PresentSize) || 'none';
        const presentSample = (Module && Module.sbop2PresentSample) || 'none';
        const logoDraw = (Module && Module.sbop2LogoDrawCount) || 0;
        const gameState = (Module && Module.sbop2GameState);
        const hasStateProc = (Module && Module.sbop2HasStateProc);
        const chgStateCount = (Module && Module.sbop2ChgStateCount) || 0;
        const onDrawCount = (Module && Module.sbop2OnDrawCount) || 0;
        const onDrawState = (Module && Module.sbop2OnDrawState);
        const onDrawHasRenderer = (Module && Module.sbop2OnDrawHasRenderer);
        const onDrawNullMgrDraw = (Module && Module.sbop2OnDrawNullMgrDraw) || 0;
        const pumpActive = (Module && Module.sbop2PumpFallbackActive) || 0;
        const pumpTick = (Module && Module.sbop2PumpFallbackTick) || 0;
        const initEndReached = (Module && Module.sbop2InitEndReached) || 0;
        const grpLoadResult = (Module && Module.sbop2GrpLoadResult);
        const grpFoundBase = (Module && Module.sbop2GrpFoundBase);
        const grpSystemExists = (Module && Module.sbop2GrpSystemExists);
        const grpSystemRead = (Module && Module.sbop2GrpSystemRead);
        const grpTitleExists = (Module && Module.sbop2GrpTitleExists);
        const grpTitleBackExists = (Module && Module.sbop2GrpTitleBackExists);

        if (chatInput) {
          chatInput.addEventListener('keydown', function(e) {
            e.stopPropagation(); // ゲームへのキー伝播をブロック
            if (e.key === 'Enter') {
              e.preventDefault();
              var text = chatInput.value;
              submitChat(text);
              chatInput.value = '';
            }
          });
          // フォーカスが入力欄にある間は canvas の keydown も止める
          chatInput.addEventListener('focus', function() {
            // 何もしない。stopPropagation は keydown で処理済み。
          });
          chatInput.addEventListener('blur', function() {
            // 入力欄からフォーカスが外れたら通常ゲーム入力欄へ戻す
            // (ただし明示的な操作でなく他 UI への移動の場合は JS 任せ)
          });
        }
      }

      // ============================================================
      // スマホ UI: ボトムシート開閉
      // ============================================================
      if (isTouch) {
        // シート表示中はキャンバスの touchstart → focusGameInput が奪わないようフラグ管理
        // sheet が開いている間は window.sbop2ChatSheetOpen = true をセット
        // canvas/touchstart リスナーは既存の focusGameInput で mobile-pad を見てスキップ済みなので
        // 追加ガードは不要だが、念のため未来の変更に備えてフラグも立てる。
        window.sbop2ChatSheetOpen = false;

        function openSheet() {
          if (!chatBottomSheet) { return; }
          window.sbop2ChatSheetOpen = true;
          chatBottomSheet.classList.add('sheet-open');
          // バーチャルパッドを隠して入力欄を操作可能にする
          document.body.classList.add('chat-sheet-open');
          // シートを開くときに既存ログを全件描画
          chatSheetLog.innerHTML = '';
          for (var i = 0; i < chatLogs.length; i++) {
            var entry = chatLogs[i];
            var line = document.createElement('div');
            line.className = 'chat-log-line';
            line.textContent = entry.text;
            if (entry.color) { line.style.color = entry.color; }
            chatSheetLog.appendChild(line);
          }
          scrollToBottom(chatSheetLog);
          // iOS でキーボードを出すため同期的に focus
          chatSheetInput.focus();
        }

        function closeSheet() {
          if (!chatBottomSheet) { return; }
          chatBottomSheet.classList.remove('sheet-open');
          document.body.classList.remove('chat-sheet-open');
          window.sbop2ChatSheetOpen = false;
          chatSheetInput.blur();
        }

        // チャット開くボタン (touchstart で同期 focus のため touchstart 使用)
        if (chatOpenBtn) {
          chatOpenBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            openSheet();
          }, { passive: false });
          // マウス操作(forcepad検証用)
          chatOpenBtn.addEventListener('click', function(e) {
            openSheet();
          });
        }

        // 閉じるボタン
        if (chatSheetCloseBtn) {
          chatSheetCloseBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            closeSheet();
          }, { passive: false });
          chatSheetCloseBtn.addEventListener('click', function() {
            closeSheet();
          });
        }

        // 送信ボタン
        if (chatSheetSendBtn) {
          chatSheetSendBtn.addEventListener('click', function() {
            var text = chatSheetInput.value;
            submitChat(text);
            chatSheetInput.value = '';
            chatSheetInput.focus();
          });
          chatSheetSendBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            var text = chatSheetInput.value;
            submitChat(text);
            chatSheetInput.value = '';
            chatSheetInput.focus();
          }, { passive: false });
        }

        // Enter(enterkeyhint="send") 送信
        if (chatSheetInput) {
          chatSheetInput.addEventListener('keydown', function(e) {
            e.stopPropagation();
            if (e.key === 'Enter') {
              e.preventDefault();
              var text = chatSheetInput.value;
              submitChat(text);
              chatSheetInput.value = '';
            }
          });
        }

        // ---- visualViewport resize: ソフトキーボード表示時にシート高さを調整 ----
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', function() {
            if (!chatBottomSheet || !chatBottomSheet.classList.contains('sheet-open')) { return; }
            // ビューポート上端から可視領域の下端までの高さをシートに使う
            var vh = window.visualViewport.height;
            // シートは50%か視覚高さの90%の小さい方にする
            var maxH = Math.floor(vh * 0.9);
            chatBottomSheet.style.height = maxH + 'px';
          });
        }
      }

    })();
  </script>
